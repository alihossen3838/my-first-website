<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon_io/favicon-32x32.png"
    />
    <title>My First Website</title>

  <body>
    <h1>This is Heading 1</h1>
    <p>Hello world!</p>

    <!-- HTML Target Anchor Tag -->

      >Visit to Google Search Engine</a
    ><br />

    />

    <h2>HTML Form Explore</h2>

      <label>Email</label>

      <label>Clickable Button</label>
      <input type="button" value="Click Me" /><br />
      <label>Checkbox</label>
      <input type="checkbox" /><br />
      <label>Select Your color</label>
      <input type="color" /><br />
      <label>Select Your Date</label>
      <input type="date" /><br />
      <label>Select Your Date & Time</label>
      <input type="datetime" /><br />

      <input type="datetime-local" /><br />
      <label>Upload Your File</label>
      <input type="file" /><br />
      <label>Some Hidden Attribute</label>
      <input type="hidden" /><br />
      <label>Select Your Image</label>
      <input
        type="image"
        src="images/battleship.jpg"
        alt="Battle Ship"
        width="100px"
        height="100px"
      /><br />
      <label>Select Your Birth MOnth</label>
      <input type="month" name="" id="" /><br />

      <input type="number" name="" id="" /><br />
      <label>Password</label>
      <input type="password" name="" id="" /><br />
      <label>Select Your First Priority</label>
      <input type="radio" name="" id="" /><br />
      <label>Select Your Range</label>
      <input type="range" /><br />
      <labe>Reset Your Input Data</labe>
      <input type="reset" /><br />
      <label>Search Your Query</label>
      <input type="search" /><br />
      <label>Submit Your Data</label>
      <input type="submit" value="Submit" /><br />
      <label>Telephone Number</label>
      <input type="tel" /><br />
      <label>Your Time</label>
      <input type="time" /><br />
      <label>Give your Social Link</label>
      <input type="url" /><br />
      <label>Select Your Week</label>
      <input type="week" /><br />
      <select name="" id="">
        <option value="Select oen">Select one</option>
        <option value="Student">Student</option>
        <option value="Teacher">Teacher</option>
        <option value="Professional">Professional</option>
      </select>
    </form>
